server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: order-inventory-system

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/order_inventory?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root

  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: order-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
  consumer:
    order-delay-topic: order-delay-topic
    order-pay-topic: order-pay-topic
    order-cancel-group: order-cancel-consumer-group
    order-pay-group: order-pay-consumer-group

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.orderinventory.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

order:
  timeout: 900
  high-risk-timeout: 300
  risk-threshold: 60

elasticsearch:
  host: localhost
  port: 9200
  scheme: http
  username:
  password:
  index:
    inventory-change: inventory_change_log

spring:
  elasticsearch:
    uris: http://localhost:9200
    username:
    password:

xxl:
  job:
    admin:
      addresses: http://127.0.0.1:8080/xxl-job-admin
    executor:
      appname: order-inventory-executor
      address:
      ip:
      port: 9999
      logpath: ./data/applogs/xxl-job/jobhandler
      logretentiondays: 30
